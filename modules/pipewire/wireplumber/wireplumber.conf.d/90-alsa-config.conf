# See the WirePlumber documentation and /usr/share/wireplumber/wireplumber.conf
# for all properties; this just overrides some settings for low latency USB audio.

monitor.alsa.rules = [
  {
    matches = [
      {
        node.name = "~alsa_input.*"
      }
      {
        node.name = "~alsa_output.*"
      }
    ]
    actions = {
      update-props = {
        audio.rate           = 48000
        api.alsa.period-size = 256
        api.alsa.period-num  = 2
        api.alsa.disable-batch = true
      }
    }
  }
  {
    matches = [
      {
        # Matches USB ALSA nodes (e.g. alsa_input.usb-* or alsa_output.usb-*)
        node.name = "~alsa_.*.usb-.*"
      }
    ]
    actions = {
      update-props = {
        # USB audio interfaces can take a while to wake up from suspending
        session.suspend-timeout-seconds = 0
      }
    }
  }
]
